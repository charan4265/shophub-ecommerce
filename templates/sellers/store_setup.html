{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Setup Your Store — ShopHub{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm border-0 mt-4">
                <div class="card-body p-4">
                    <h3 class="mb-1"><i class="bi bi-shop"></i> Setup Your Store</h3>
                    <p class="text-muted mb-4">Fill in your store details. Our team will review and approve it.</p>

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-circle"></i> Submit Store for Approval
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
