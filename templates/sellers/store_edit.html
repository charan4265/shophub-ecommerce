{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Edit Store — {{ store.name }}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm border-0 mt-4">
                <div class="card-body p-4">
                    <h3 class="mb-4">
                        <i class="bi bi-pencil-square"></i> Edit Store — {{ store.name }}
                    </h3>
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Save Changes
                            </button>
                            <a href="{% url 'sellers:dashboard' %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
